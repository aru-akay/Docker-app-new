<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
    <div class="logo">Anand DevOps 🚀</div>
    <ul>
        <li><a href="/">Home</a></li>

</nav>

<div class="login-container">
    <h2>Login</h2>
    <form action="/login" method="POST">

    </form>
</div>

</body>
</html>
